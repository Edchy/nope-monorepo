settings:
  hide: true
  content:
    merge: true
  commit:
    identity: app
    templates:
      create: "content(create): {path}"
      update: "content(update): {path}"
      delete: "content(delete): {path}"
      rename: "content(rename): {oldPath} -> {newPath}"

content:
  - name: blog
    label: Blog
    type: collection
    path: content/blog
    filename:
      template: "{primary}.md"
      field: true
    view:
      primary: title
      fields: [title, date, draft]
      sort: [date, title]
      search: [title, description, author, tags]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: Title
        type: string
      - name: description
        label: Description
        type: text
        options:
          rows: 3
      - name: date
        label: Date
        type: date
      - name: subtitle
        label: Subtitle
        type: string
      - name: author
        label: Author
        type: string
      - name: tags
        label: Tags
        type: select
        options:
          multiple: true
          creatable: true
          placeholder: "Choose tags or create a new one"
          values:
            - ai
            - building
            - claude-code
            - cli
            - ecosystem
            - fundamentals
            - history
            - llm
            - mcp
            - models
            - prompting
            - technical
            - tools
            - workflow
      - name: draft
        label: Draft
        type: boolean
        default: false
      - name: body
        label: Body
        type: rich-text
        options:
          format: markdown
          media: false

  - name: work
    label: Work
    type: collection
    path: content/work
    filename:
      template: "{primary}/index.md"
      field: create
    view:
      primary: title
      fields: [title, type, section, date, effort]
      sort: [date, title, section, effort]
      search: [title, description, type, tags, tech, url]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: Title
        type: string
      - name: description
        label: Description
        type: text
        options:
          rows: 4
      - name: date
        label: Date
        type: date
      - name: type
        label: Type
        type: string
      - name: section
        label: Section
        type: select
        options:
          values:
            - value: selected
              label: Selected
            - value: archive
              label: Archive
      - name: tags
        label: Tags
        type: select
        options:
          multiple: true
          creatable: true
          placeholder: "Choose tags or create a new one"
          values:
            - admin
            - brand
            - brochure
            - calculator
            - catalog
            - community
            - concept
            - consumer
            - database
            - fitness
            - health
            - job search
            - marketplace
            - planning
            - playground
            - portfolio
            - productivity
            - public sector
            - realtime
            - residential
            - tracking
      - name: tech
        label: Tech
        type: select
        options:
          multiple: true
          creatable: true
          placeholder: "Choose tech or create a new one"
          values:
            - Astro
            - Expo
            - Express
            - JavaScript
            - MongoDB
            - MySQL
            - Node.js
            - PHP
            - React
            - React Native
            - Socket.IO
            - Tailwind CSS
            - TypeScript
            - Vanilla
            - Vite
            - shadcn/ui
      - name: effort
        label: Effort
        type: number
        options:
          min: 1
          max: 3
          step: 1
      - name: url
        label: URL
        type: string
      - name: images
        label: Images
        type: select
        options:
          multiple: true
          creatable: true
          values: []
          placeholder: "Add one ./image.jpg or full URL per item"
      - name: body
        label: Body
        type: rich-text
        options:
          format: markdown
          media: false

